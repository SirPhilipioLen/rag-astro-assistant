services:
  rag-web:
    build: .
    container_name: rag_web_app
    ports:
      - "7860:7860"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./papers:/app/papers
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    restart: unless-stopped

  rag-cli:
    build: .
    container_name: rag_cli_app
    volumes:
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    stdin_open: true
    tty: true
    command: python chat.py

  rag-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: rag_cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://rag-web:7860
    depends_on:
      - rag-web